server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Match Caddy's request-body limit so uploads don't get rejected
    # at this hop with HTTP 413. Without this, nginx's 1 MB default
    # blocks any video upload past the trivial-thumbnail size — even
    # though Caddy in front and FastAPI behind both accept much
    # larger bodies.
    client_max_body_size 500M;

    # Frontend routes — SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Stream the upload body straight to the backend instead of
        # buffering the whole 500 MB into nginx first. Without this,
        # nginx writes the body to /var/cache/nginx/client_temp/
        # before forwarding, doubling memory + disk pressure on the
        # frontend container.
        proxy_request_buffering off;
        proxy_buffering off;
        # Long-running uploads / analyses (Whisper + MediaPipe on
        # CPU can take 60-120 s on a 1-min video). Default 60 s
        # nginx proxy timeout was killing slow requests mid-flight.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Proxy WebSocket
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        # WS sessions stay open for the duration of live practice;
        # default 60s read timeout would kill an idle pause.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Health check endpoint proxy
    location /health {
        proxy_pass http://backend:8000;
    }
}
