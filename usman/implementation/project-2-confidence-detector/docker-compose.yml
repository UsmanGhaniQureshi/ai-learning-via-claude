# ─────────────────────────────────────────────────────────────────────
# confidence-detector application stack.
#
# This stack does NOT terminate TLS or bind host ports 80/443. The
# shared infra/proxy stack on this VPS runs Caddy and routes
# `confidence-detector.logicsbay.com` -> the `frontend` container
# below, over the external docker network `proxy`.
#
# Internal services (postgres, backend) stay on the default network
# and are unreachable from other apps on the box. Only `frontend`
# joins `proxy` to receive traffic from Caddy.
# ─────────────────────────────────────────────────────────────────────

services:
  # ── Postgres: app database ────────────────────────────────────────
  # 16 is the current LTS line. Data lives on a named volume so
  # `docker-compose down` doesn't wipe it. Healthcheck blocks the
  # backend from starting until pg_isready returns success.
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      # MUST match the DB_* values in .env (the backend connects via
      # those). NOT exposed to the host network — only the backend
      # service can reach this container.
      POSTGRES_DB: ${DB_NAME:-confidence_detector_app}
      POSTGRES_USER: ${DB_USER:-cd_app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No `ports:` mapping — Postgres is internal-only. If you need to
    # connect from your laptop for debugging, use:
    #   docker-compose exec postgres psql -U cd_app

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      # UPLOAD_DIR is hardcoded here because it's tied to the volume
      # mount path below — overriding via .env would store user
      # uploads on the ephemeral container filesystem.
      UPLOAD_DIR: /data/uploads
      # Backend connects to the postgres SERVICE name, not localhost.
      # Override DB_HOST in .env to use an external Postgres.
      DB_HOST: ${DB_HOST:-postgres}
    env_file:
      # All other config (ENV, JWT_SECRET, MEDIA_URL_SECRET,
      # DB_USER/PASSWORD/NAME, UVICORN_WORKERS, MAX_LIVE_SESSIONS,
      # MAX_CONCURRENT_*, WHISPER_MODEL, GEMINI_API_KEY, etc.) comes
      # from .env. ENV must be set to `production` for prod deploys.
      # See .env.production.example for the full template.
      - .env
    volumes:
      # Whisper / MediaPipe model cache — re-used across container
      # restarts so we don't re-download the ~166 MB Whisper weights
      # every deploy.
      - model-cache:/app/models
      # User uploads + processed videos. Named volume so they survive
      # `docker-compose up --force-recreate`.
      - uploads-data:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    # No `ports:` mapping and no `proxy` network — backend is reachable
    # only by frontend over the default compose network. The shared
    # Caddy never touches the backend directly.

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    # Caddy reaches us by this name on the `proxy` network.
    container_name: frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      # default = internal compose network, so we can talk to backend.
      - default
      # proxy = external shared network, so Caddy can reach us.
      - proxy

volumes:
  postgres-data:
  model-cache:
  uploads-data:

networks:
  # Created and owned by the shared infra/proxy stack. Must already
  # exist before this compose starts — check with `docker network ls`.
  proxy:
    external: true
    name: proxy
