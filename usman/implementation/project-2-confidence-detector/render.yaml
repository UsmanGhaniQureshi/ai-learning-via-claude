services:
  - type: web
    name: confidence-detector-backend
    env: python
    buildCommand: pip install -r requirements.txt && bash scripts/download_models.sh backend/
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: CORS_ORIGINS
        value: "*"

  - type: web
    name: confidence-detector-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
